<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Explainer</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
    <main class="app-container">        
        <header>
            <h1>Code Explainer</h1>
            <p class="subtitle">developed by Yash Kansara</p>
        </header>

        <section class="input-section">
            <div class="editor-header">
                <span>Python Input</span>
            </div>
            <textarea id="codeInput" placeholder="# Paste your Python code here...&#10;&#10;import cv2&#10;print('Ready to analyze!')" spellcheck="false"></textarea>
            
            <button id="explainBtn" class="primary-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                Analyze Code
            </button>
        </section>

        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>Analyzing logic...</p>
        </div>

        <section id="outputSection" class="hidden">
            <div class="editor-header">
                <span>AI Breakdown</span>
                <button id="copyBtn" class="icon-btn" title="Copy to clipboard">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    Copy
                </button>
            </div>
            <div id="resultContainer" class="markdown-body"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
